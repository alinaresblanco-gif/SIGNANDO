<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>SIGNANDO</title>
	<meta name="theme-color" content="#000000">
	<link rel="manifest" href="manifest.webmanifest">
	<link rel="icon" type="image/png" sizes="192x192" href="imagenes/icon-192.png">
	<link rel="apple-touch-icon" sizes="180x180" href="imagenes/apple-touch-icon.png">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap');

		:root {
			--brand-blue: #0f4fa8;
			--brand-blue-dark: #063174;
			--brand-yellow: #ffd327;
			--ink: #04122d;
			--soft-white: #f4f8ff;
			--btn-height: 56px;
			--lift-amount: calc(var(--btn-height) + 10px);
		}

		*, *::before, *::after {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow-x: hidden;
			background: #02102a;
			font-family: 'Lexend', 'Segoe UI', Tahoma, sans-serif;
		}

		body {
			min-height: 100vh;
		}

		.pantalla-inicio {
			position: relative;
			width: 100%;
			height: 100vh;
			display: flex;
			align-items: stretch;
			justify-content: center;
			overflow: hidden;
		}

		.fondo {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			object-position: center top;
		}

		.capa-color {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(180deg, rgba(255, 211, 39, 0.06) 0%, rgba(15, 79, 168, 0.2) 55%, rgba(4, 18, 45, 0.55) 100%),
				radial-gradient(circle at 50% 8%, rgba(255, 211, 39, 0.14) 0%, rgba(255, 211, 39, 0) 34%);
		}

		.interfaz {
			position: relative;
			z-index: 2;
			width: min(100vw, 770px);
			height: calc(100vh - 1.5rem);
			margin-top: 0.75rem;
			margin-bottom: 0.75rem;
			display: grid;
			grid-template-rows: auto auto 1fr;
			gap: 0.75rem;
			padding: 1rem;
			border-radius: 0;
			background: transparent;
			backdrop-filter: none;
			overflow-x: hidden;
			max-width: 100vw;
			transform: translateY(calc(-1 * var(--lift-amount)));
		}

		.marca {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.1rem;
			width: 100%;
			max-width: 100%;
			overflow: hidden;
		}

		.marca img {
			width: min(42vw, 320px);
			height: min(42vw, 320px);
			object-fit: contain;
			flex: 0 0 auto;
		}

		.marca span {
			font-size: clamp(1.6rem, 6.3vw, 3rem);
			font-weight: 800;
			letter-spacing: 0.04em;
			color: var(--brand-blue-dark);
			text-shadow: 0 1px 0 rgba(255, 255, 255, 0.28);
			margin-left: 0;
			white-space: nowrap;
			max-width: calc(100% - 140px);
			flex: 1 1 auto;
			overflow: hidden;
			text-overflow: clip;
		}

		.titulo h1 {
			margin: 0;
			font-size: clamp(1.55rem, 4.8vw, 2rem);
			line-height: 1.12;
			color: #ffffff;
			text-align: center;
			transform: translateY(-20px);
		}

		.botonera {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			column-gap: 0.55rem;
			row-gap: 0.95rem;
			overflow: auto;
			padding-right: 0;
			align-content: stretch;
			grid-auto-rows: minmax(var(--btn-height), 1fr);
			margin-top: calc(2.5vh + 10px);
		}

		.botonera a {
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			text-decoration: none;
			font-weight: 700;
			font-size: 0.81rem;
			line-height: 1.2;
			min-height: var(--btn-height);
			padding: 0.62rem 0.68rem;
			border-radius: 14px;
			color: #ffffff;
			min-width: 0;
			overflow-wrap: anywhere;
			background: linear-gradient(90deg, rgba(15, 79, 168, 0.25) 0%, rgba(255, 211, 39, 0.25) 100%);
			border: 1px solid rgba(255, 255, 255, 0.32);
			box-shadow: 0 2px 0 rgba(4, 18, 45, 0.4);
			transition: transform 0.16s ease, filter 0.16s ease;
		}

		.botonera a:active {
			transform: translateY(2px);
			filter: brightness(0.98);
		}

		@media (max-width: 770px) {
			:root {
				--btn-height: 54px;
			}

			.interfaz {
				width: calc(100vw - 0.6rem);
				height: calc(100vh - 0.7rem);
				margin: 0.3rem;
				padding: 0.8rem;
				border-radius: 22px;
			}

			.botonera {
				margin-top: calc(1.5vh + 10px);
				row-gap: 0.8rem;
				grid-auto-rows: minmax(var(--btn-height), 1fr);
			}

			.botonera a {
				font-size: 0.85rem;
				min-height: var(--btn-height);
			}
		}

		@media (max-width: 220px) {
			.interfaz {
				width: calc(100vw - 0.3rem);
				height: calc(100vh - 0.3rem);
				margin: 0.15rem;
				padding: 0.45rem;
				border-radius: 14px;
				gap: 0.45rem;
			}

			.marca {
				flex-direction: column;
				gap: 0.05rem;
			}

			.marca img {
				width: min(92vw, 150px);
				height: min(92vw, 150px);
			}

			.marca span {
				font-size: clamp(1.3rem, 11vw, 1.8rem);
				line-height: 1;
			}

			.titulo h1 {
				font-size: clamp(1rem, 9vw, 1.25rem);
				line-height: 1.08;
				transform: translateY(-20px);
			}

			.botonera {
				grid-template-columns: 1fr;
				row-gap: 0.45rem;
				grid-auto-rows: minmax(42px, auto);
				margin-top: 10px;
			}

			.botonera a {
				font-size: 0.72rem;
				min-height: 42px;
				padding: 0.4rem 0.35rem;
				border-radius: 10px;
			}
		}
	</style>
</head>
<body>
	<main class="pantalla-inicio">
		<img class="fondo" src="imagenes/fondo_pantalla.png" alt="Pantalla de inicio de SIGNANDO">
		<div class="capa-color"></div>

		<section class="interfaz" aria-label="Panel principal de navegacion">
			<div class="marca">
				<img src="imagenes/icon-192.png" alt="Logo de SIGNANDO">
				<span>SIGNANDO</span>
			</div>

			<header class="titulo">
				<h1>Aprende lengua de signos con practica real</h1>
			</header>

			<nav class="botonera" aria-label="Vistas principales">
				<a href="vistas/inicio.html">Inicio</a>
				<a href="vistas/explorar-vocabulario.html">Explorar vocabulario</a>
				<a href="vistas/detalle-signo.html">Detalle de signo</a>
				<a href="vistas/practica.html">Practica</a>
				<a href="vistas/correcion-resultado.html">Correccion y resultado</a>
				<a href="vistas/reto-diario.html">Reto diario</a>
				<a href="vistas/progreso.html">Progreso</a>
				<a href="vistas/favoritos.html">Favoritos</a>
				<a href="vistas/buscador.html">Buscador</a>
				<a href="vistas/perfil-ajustes.html">Perfil y ajustes</a>
				<a href="vistas/tutor-ia.html">Tutor IA</a>
				<a href="vistas/practica-camara.html">Practica con camara</a>
				<a href="vistas/panel-admin-contenidos.html">Panel admin contenidos</a>
				<a href="vistas/leccion-html">Leccion</a>
			</nav>

		</section>
	</main>
	<script>
		(async () => {
			const resetRequested = new URLSearchParams(window.location.search).get('sw-reset') === '1';

			if (resetRequested && 'serviceWorker' in navigator) {
				const registrations = await navigator.serviceWorker.getRegistrations();
				await Promise.all(registrations.map((registration) => registration.unregister()));

				if ('caches' in window) {
					const cacheKeys = await caches.keys();
					await Promise.all(cacheKeys.map((cacheName) => caches.delete(cacheName)));
				}

				const cleanUrl = new URL(window.location.href);
				cleanUrl.searchParams.delete('sw-reset');
				window.location.replace(cleanUrl.toString());
				return;
			}

			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('sw.js');
				});
			}
		})();
	</script>
</body>
</html>
