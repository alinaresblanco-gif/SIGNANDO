<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>SIGNANDO</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow-x: hidden;
			background: #000;
		}

		body {
			min-height: 100vh;
		}

		.pantalla-inicio {
			width: 100vw;
			max-width: 100%;
			display: block;
			height: 100vh;
		}

		.pantalla-inicio img {
			display: block;
			width: 100%;
			height: 100%;
			object-fit: cover;
			object-position: center;
		}
	</style>
</head>
<body>
	<main class="pantalla-inicio">
		<img src="imagenes/fondo_pantalla.png" alt="Pantalla de inicio de SIGNANDO">
	</main>
</body>
</html>
