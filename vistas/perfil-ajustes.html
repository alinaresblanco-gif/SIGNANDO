<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SIGNANDO – Perfil y Ajustes</title>
  <meta name="theme-color" content="#0f4fa8">
  <link rel="icon" type="image/png" sizes="192x192" href="../imagenes/icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap');
    :root {
      --brand-blue: #0f4fa8;
      --brand-blue-dark: #063174;
      --brand-yellow: #ffd327;
      --ink: #04122d;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #02102a;
      font-family: 'Lexend', 'Segoe UI', Tahoma, sans-serif;
      color: #ffffff;
    }
    body {
      position: relative;
      isolation: isolate;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: url('../imagenes/fondo_pantalla.png') center top / cover no-repeat;
      opacity: 0.5;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(2, 16, 42, 0.38) 0%, rgba(2, 16, 42, 0.62) 100%);
      pointer-events: none;
    }
    .vista-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      padding: 0 1.9rem;
      height: 140px;
      background: linear-gradient(90deg, var(--brand-blue-dark) 0%, var(--brand-blue) 100%);
      border-bottom: 3px solid var(--brand-yellow);
      box-shadow: 0 3px 14px rgba(4, 18, 45, 0.55);
    }
    .vista-header__titulo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.82rem;
      min-width: 0;
      max-width: calc(100vw - 150px);
      text-align: center;
    }
    .vista-header__icono {
      font-size: 2.25rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .vista-header__nombre {
      font-size: clamp(1.17rem, 4.8vw, 1.58rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--brand-yellow);
      text-transform: uppercase;
      white-space: normal;
      overflow: visible;
      line-height: 1.15;
      text-wrap: balance;
    }
    .vista-header__btn-volver {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--ink);
      background: var(--brand-yellow);
      border: none;
      border-radius: 14px;
      width: 54px;
      height: 54px;
      padding: 0;
      box-shadow: 0 2px 0 rgba(4, 18, 45, 0.35);
      transition: filter 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }
    .vista-header__btn-volver svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }
    .vista-header__btn-volver:active {
      transform: translateY(2px);
      filter: brightness(0.94);
    }
    .perfil-ajustes-main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 140px);
      min-height: 0;
      padding: 0;
      margin: 0;
    }
    .tabs-corporativas.tabs-fixed {
      display: flex;
      flex-direction: row;
      width: 100%;
      position: sticky;
      top: 0;
      left: 0;
      z-index: 10;
      background: linear-gradient(90deg, var(--brand-blue-dark) 0%, var(--brand-blue) 100%);
      border-bottom: 3px solid var(--brand-yellow);
      box-shadow: 0 2px 8px rgba(4,18,45,0.10);
      margin: 0;
      padding: 0;
    }
    .tab-btn {
      flex: 1 1 0;
      font-family: 'Lexend', 'Segoe UI', Tahoma, sans-serif;
      font-weight: 700;
      font-size: 1.13rem;
      padding: 1.1rem 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      outline: none;
      border-bottom: 3px solid transparent;
      box-shadow: none;
      margin: 0;
    }
    .tab-btn.active, .tab-btn:focus {
      background: var(--brand-yellow);
      color: var(--ink);
      border-bottom: 3px solid var(--brand-yellow);
      z-index: 2;
    }
    .tabs-paneles-scroll {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      background: none;
      position: relative;
      min-height: 0;
      display: flex;
    }
    .tab-panel {
      flex: 1 1 100%;
      width: 100%;
      background: linear-gradient(135deg, rgba(15,79,168,0.10) 0%, rgba(255,211,39,0.06) 100%);
      border-radius: 0 0 22px 22px;
      box-shadow: 0 4px 18px rgba(4,18,45,0.10);
      padding: 2.2rem 1.5rem 1.5rem 1.5rem;
      display: none;
      min-height: 100%;
      animation: fadein 0.3s;
      overflow-y: auto;
    }
    .tab-panel.active {
      display: block;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .vista-header { height: 112px; padding: 0 0.9rem; }
      .vista-header__titulo { max-width: calc(100vw - 92px); gap: 0.45rem; }
      .vista-header__icono { font-size: 1.85rem; }
      .vista-header__nombre { font-size: clamp(0.88rem, 4.2vw, 1.08rem); }
      .vista-header__btn-volver { width: 44px; height: 44px; }
      .perfil-ajustes-main { height: calc(100vh - 112px); }
      .tab-panel { padding: 1.2rem 0.5rem; }
      .tab-btn { font-size: 0.98rem; padding: 0.7rem 0; }
    }
  </style>
</head>
<body>
  <header class="vista-header">
    <div class="vista-header__titulo">
      <span class="vista-header__icono" aria-hidden="true">👤</span>
      <span class="vista-header__nombre">PERFIL Y AJUSTES</span>
    </div>
    <a href="../index.html" class="vista-header__btn-volver" aria-label="Volver al menú principal">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 3.2 3.8 10v10.2h5.7v-5.8h5V20h5.7V10L12 3.2zm0-2.2 10 8.3v12.7h-9.7v-5.8h-.6V22H2V9.3L12 1z"/>
      </svg>
    </a>
  </header>
  <main class="vista-contenido perfil-ajustes-main">
    <div class="tabs-corporativas tabs-fixed">
      <button class="tab-btn active" id="tab-perfil-btn" type="button">Perfil</button>
      <button class="tab-btn" id="tab-ajustes-btn" type="button">Ajustes</button>
    </div>
    <div class="tabs-paneles-scroll">
      <section class="tab-panel active" id="tab-perfil-panel">
        <!-- Aquí irá el contenido de Perfil -->
        <h2>Tu Perfil</h2>
        <p>Aquí aparecerán tus datos personales y opciones de edición.</p>
      </section>
      <section class="tab-panel" id="tab-ajustes-panel">
        <!-- Aquí irá el contenido de Ajustes -->
        <h2>Ajustes</h2>
        <p>Aquí podrás modificar tus preferencias y configuración de la app.</p>
      </section>
    </div>
  </main>
  <script>
  // Tabs funcionalidad
  document.addEventListener('DOMContentLoaded', function() {
    const perfilBtn = document.getElementById('tab-perfil-btn');
    const ajustesBtn = document.getElementById('tab-ajustes-btn');
    const perfilPanel = document.getElementById('tab-perfil-panel');
    const ajustesPanel = document.getElementById('tab-ajustes-panel');
    perfilBtn.addEventListener('click', function() {
      perfilBtn.classList.add('active');
      ajustesBtn.classList.remove('active');
      perfilPanel.classList.add('active');
      ajustesPanel.classList.remove('active');
    });
    ajustesBtn.addEventListener('click', function() {
      ajustesBtn.classList.add('active');
      perfilBtn.classList.remove('active');
      ajustesPanel.classList.add('active');
      perfilPanel.classList.remove('active');
    });
  });
  </script>
</body>
</html>
